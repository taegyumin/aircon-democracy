name: Check (unit + data + build + lint)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    timeout-minutes: 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Data integrity
        run: npm run check:data
      - name: Store copy SSOT drift
        # docs/store/store-copy.json(SSOT)와 생성 산출물(store.config.json, play/*.txt)이
        # 어긋나면 실패. 왜: 카피를 손으로 복사하다 어긋나 '제거한 기능을 스토어가 광고'하는
        # 심사 리젝 사고 방지 (snuboard 교훈). 고치려면 store-copy.json 수정 → npm run store:sync.
        run: npm run store:check
      - name: Unit tests (packages/core + apps/web)
        run: npm run test:unit
      - name: Next.js build (RSC/edge boundary 검증)
        # PR에서 E2E를 뺀 대신 build가 안전망. tsc만으론 client/server
        # boundary 위반(예: server-only API를 client component에서 import)을
        # 못 잡음. 'use client' + edge runtime 조합 확인 가능.
        run: npm run -w @aircon/web build
      - name: ESLint (apps/web) — Rules of Hooks 등
        # next lint는 react-hooks recommend 포함. config는 apps/web/.eslintrc.json.
        # warnings는 통과시키되 errors (rules-of-hooks 등)는 막는다 — LLM 리뷰 P1.
        run: npm run -w @aircon/web lint
