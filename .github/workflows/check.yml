name: Check (unit + data + build + lint)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    timeout-minutes: 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Data integrity
        run: npm run check:data
      - name: Unit tests (packages/core + apps/web)
        run: npm run test:unit
      - name: Next.js build (RSC/edge boundary 검증)
        # PR에서 E2E를 뺀 대신 build가 안전망. tsc만으론 client/server
        # boundary 위반(예: server-only API를 client component에서 import)을
        # 못 잡음. 'use client' + edge runtime 조합 확인 가능.
        run: npm run -w @aircon/web build
      - name: ESLint (apps/web) — Rules of Hooks 등
        # next lint는 react-hooks recommend 포함
        run: npm run -w @aircon/web lint
        continue-on-error: true # 신호용 (점진 cleanup)
