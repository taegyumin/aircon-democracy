name: Check (unit + data + build + lint)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    timeout-minutes: 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Gate (data + store + design + typecheck + lint + unit)
        # 로컬 배포 게이트(npm run gate)와 **동일 단일 명령** — CI와 로컬이 어긋나지 않게.
        # 포함: check:data / store:check(스토어 카피 SSOT) / design:check(하드코딩 색 ratchet) /
        # typecheck(core+web+mobile tsc) / lint(next lint, Rules of Hooks) / test:unit(core+web).
        run: npm run gate
      - name: Next.js build (RSC/edge boundary 검증)
        # gate는 빌드를 안 한다. build가 tsc/unit이 못 잡는 server/client boundary 위반
        # (server-only API를 client component에서 import 등)을 잡는 안전망 (#310류 렌더 크래시).
        run: npm run -w @aircon/web build
